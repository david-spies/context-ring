<svg width="1100" height="320" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071018"/>
      <stop offset="50%" stop-color="#0d1630"/>
      <stop offset="100%" stop-color="#140a24"/>
    </linearGradient>

    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff9d"/>
      <stop offset="50%" stop-color="#00cfff"/>
      <stop offset="100%" stop-color="#ff3ef2"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1100" height="320" fill="url(#bg)"/>

  <!-- animated code streams -->
  <g opacity="0.25">
    <g fill="#00ff9d" font-family="monospace" font-size="12">
      <text x="-200" y="70">hash(session_id) → agent_01 → cache_hit ✓</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1400 0" dur="12s" repeatCount="indefinite"/>
    </g>
    <g fill="#00cfff" font-family="monospace" font-size="12">
      <text x="-300" y="250">vnode_127 • mmh3 • O(log N) • routing</text>
      <animateTransform attributeName="transform" type="translate" from="0 0" to="1500 0" dur="16s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- Context Ring -->
  <g transform="translate(550,160)">
    <ellipse rx="180" ry="58" fill="none" stroke="url(#neon)" stroke-width="10" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="1,12;20,8;1,12" dur="6s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse rx="155" ry="40" fill="none" stroke="#00ff9d" stroke-width="2" opacity="0.5"/>

    <text x="0" y="12" text-anchor="middle"
          fill="#d7ffff" font-family="Segoe UI, Arial, sans-serif"
          font-size="44" font-weight="700">
      CONTEXT-RING
    </text>
  </g>

  <!-- swarm agents -->
  <g font-family="Segoe UI, Arial, sans-serif" fill="#dff">
    <circle cx="170" cy="70" r="20" stroke="#00ff9d" fill="none"/>
    <text x="140" y="40">RESEARCHER</text>

    <circle cx="930" cy="70" r="20" stroke="#00cfff" fill="none"/>
    <text x="900" y="40">PLANNER</text>

    <circle cx="1000" cy="160" r="20" stroke="#ff3ef2" fill="none"/>
    <text x="965" y="195">EXECUTOR</text>

    <circle cx="930" cy="250" r="20" stroke="#00ff9d" fill="none"/>
    <text x="900" y="285">TESTER</text>

    <circle cx="170" cy="250" r="20" stroke="#00cfff" fill="none"/>
    <text x="145" y="285">WRITER</text>

    <circle cx="100" cy="160" r="20" stroke="#ff3ef2" fill="none"/>
    <text x="65" y="195">ANALYST</text>
  </g>

  <!-- routing beams -->
  <g stroke="url(#neon)" stroke-width="3" fill="none" filter="url(#glow)">
    <path d="M190 70 Q320 100 400 140">
      <animate attributeName="stroke-opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M910 70 Q780 100 700 140">
      <animate attributeName="stroke-opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/>
    </path>
    <path d="M980 160 Q840 160 730 160"/>
    <path d="M910 250 Q780 220 700 180"/>
    <path d="M190 250 Q320 220 400 180"/>
    <path d="M120 160 Q260 160 370 160"/>
  </g>

  <!-- moving packets -->
  <g>
    <circle r="5" fill="#00ff9d">
      <animateMotion dur="3s" repeatCount="indefinite"
        path="M190 70 Q320 100 400 140"/>
    </circle>
    <circle r="5" fill="#00cfff">
      <animateMotion dur="4s" repeatCount="indefinite"
        path="M910 250 Q780 220 700 180"/>
    </circle>
    <circle r="5" fill="#ff3ef2">
      <animateMotion dur="5s" repeatCount="indefinite"
        path="M120 160 Q260 160 370 160"/>
    </circle>
  </g>

  <text x="550" y="305" text-anchor="middle"
        fill="#9adfff" font-size="16"
        font-family="monospace">
    State-Preserving Consistent-Hash Load Balancer for AI Agent Swarms
  </text>
</svg>